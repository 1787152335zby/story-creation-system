# 工作流配置 - 定义Agent的执行顺序和条件
# 修改此文件可调整流水线，无需改动代码

phases:
  - name: 故事大纲
    agent: outline_designer
    output: 01_故事大纲/
    condition: true
    auto_skip: false

  - name: 完整剧情
    agent: plot_expander
    output: 02_完整剧情/
    condition: true
    auto_skip: false
    split: true

  - name: 完整剧本
    agent: screenplay_writer
    output: 03_完整剧本/
    condition: true
    auto_skip: false
    split: true

  - name: 视觉提取
    agent: visual_extractor
    output: 04_角色场景/
    condition: true
    auto_skip: false
    split: false

  - name: 分镜设计
    agent: storyboarder
    output: 05_分镜脚本/
    condition: "story_type in ['1', '2', '3']"
    auto_skip: false
    split: true

  - name: 提示词生成
    agent: prompt_factory
    output: 06_提示词/
    condition: "story_type in ['1', '2', '3']"
    auto_skip: false
    split: true
